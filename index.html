<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="极速记账">
    <title>极速资产记账本</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/3.9.1/chart.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --bg-color: #f2f2f7;
            --card-bg: rgba(255, 255, 255, 0.85);
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            background-image: radial-gradient(circle at 50% 0%, #e0e7ff 0%, #f2f2f7 40%);
            background-attachment: fixed;
            -webkit-tap-highlight-color: transparent;
            overscroll-behavior-y: none;
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        .glass-card {
            background: var(--card-bg);
            backdrop-filter: saturate(180%) blur(20px);
            -webkit-backdrop-filter: saturate(180%) blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.5);
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.04);
            border-radius: 24px;
        }

        .account-card {
            min-width: 140px;
            scroll-snap-align: start;
            transition: transform 0.2s;
        }
        .account-card:active { transform: scale(0.96); }

        .segmented-control {
            background: rgba(118, 118, 128, 0.12);
            border-radius: 9px;
            padding: 2px;
            display: flex;
        }
        .segmented-btn {
            flex: 1;
            text-align: center;
            padding: 6px 0;
            font-size: 13px;
            font-weight: 600;
            border-radius: 7px;
            color: #3c3c43;
            transition: all 0.2s ease;
        }
        .segmented-btn.active {
            background-color: #fff;
            box-shadow: 0 3px 8px rgba(0,0,0,0.12), 0 3px 1px rgba(0,0,0,0.04);
            color: #000;
        }

        input, select, textarea {
            font-size: 16px !important;
            background: rgba(118, 118, 128, 0.05);
            -webkit-appearance: none; 
        }
        input[type="date"], input[type="month"] {
            display: block;
            min-height: 2.5rem;
        }
        
        /* 账户渐变色 */
        .grad-alipay { background: linear-gradient(135deg, #1677FF 0%, #0050B3 100%); }
        .grad-wechat { background: linear-gradient(135deg, #07C160 0%, #05964A 100%); }
        .grad-boc { background: linear-gradient(135deg, #B22222 0%, #8B0000 100%); } 
        .grad-icbc { background: linear-gradient(135deg, #C8161D 0%, #9A0D12 100%); } 
        .grad-abc { background: linear-gradient(135deg, #009688 0%, #00695C 100%); } 
        .grad-spdb { background: linear-gradient(135deg, #1A237E 0%, #0D47A1 100%); } 
        .grad-partner { background: linear-gradient(135deg, #FF6B6B 0%, #D81B60 100%); } 
        .grad-stock { background: linear-gradient(135deg, #FF416C 0%, #FF4B2B 100%); } 
        .grad-fund { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); } 

        .app-container {
            max-width: 480px;
            margin: 0 auto;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: transparent;
            position: relative;
        }

        /* 模态框样式 */
        .modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 100;
            align-items: center;
            justify-content: center;
            padding: 20px;
            -webkit-overflow-scrolling: touch;
        }
        .modal-content {
            background: white;
            border-radius: 20px;
            width: 100%;
            max-width: 400px;
            padding: 24px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            max-height: 85vh;
            overflow-y: auto;
        }
        .setting-row {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px 0; border-bottom: 1px solid #f3f4f6;
        }
        .setting-row:last-child { border-bottom: none; }

        /* 撤回提示 Toast 动画 */
        #undo-toast {
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .toast-hidden {
            transform: translate(-50%, 150%);
            opacity: 0;
            pointer-events: none;
        }
        .toast-visible {
            transform: translate(-50%, 0);
            opacity: 1;
            pointer-events: auto;
        }
        
        .truncate-text {
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 160px;
        }
    </style>
</head>
<body class="pb-safe"> <!-- 适配 iPhone 底部小黑条 -->

<div class="app-container">
    
    <header class="pt-12 pb-4 px-6 z-10 flex-shrink-0">
        <!-- 顶部功能栏 -->
        <div class="absolute top-4 left-6 flex gap-2">
            <button onclick="openTransferModal()" class="text-[11px] font-medium text-blue-600 bg-blue-50 px-2 py-1.5 rounded-full border border-blue-100 flex items-center gap-1.5 active:scale-95 transition-transform">
                <i class="fa-solid fa-cloud-arrow-down"></i> 备份与恢复
            </button>
        </div>
        
        <div class="absolute top-4 right-6 flex gap-2">
            <button onclick="openSettingsModal()" class="w-8 h-8 bg-white/50 backdrop-blur-md rounded-full border border-white flex items-center justify-center text-gray-600 active:scale-95 transition-transform shadow-sm">
                <i class="fa-solid fa-gear"></i>
            </button>
        </div>

        <!-- 总资产展示区 -->
        <div class="flex justify-between items-start mb-6 mt-6">
            <div class="flex flex-col gap-2">
                <div>
                    <p class="text-gray-500 text-sm font-medium mb-1">我的个人总净资产</p>
                    <h1 id="total-balance" class="text-4xl font-extrabold tracking-tight text-gray-900">¥0.00</h1>
                </div>
                <div class="inline-flex items-center gap-2 bg-pink-50/80 px-3 py-1.5 rounded-lg border border-pink-100/50 w-fit mt-1">
                    <i class="fa-solid fa-heart text-pink-400 text-xs"></i>
                    <span class="text-gray-500 text-xs font-medium">对象/家庭资金：</span>
                    <span id="partner-balance" class="text-pink-600 font-bold text-sm">¥0.00</span>
                </div>
            </div>
        </div>

        <!-- 银行卡横向滑动区 -->
        <div class="flex overflow-x-auto hide-scrollbar gap-4 pb-4 snap-x snap-mandatory" id="account-container">
            <!-- 卡片由 JS 注入 -->
        </div>
    </header>

    <main class="flex-1 overflow-y-auto px-4 pb-8 flex flex-col gap-5 hide-scrollbar">
        
        <!-- 快速记账卡片 -->
        <div class="glass-card p-5 shadow-sm border border-gray-100/50">
            <h3 class="font-bold text-lg mb-4 text-gray-800 flex items-center gap-2">
                <i class="fa-solid fa-pen-nib text-blue-500"></i> 快速记账
            </h3>
            <form id="form" class="space-y-4">
                <div class="segmented-control mb-4">
                    <button type="button" class="segmented-btn active" data-type="expense">支出</button>
                    <button type="button" class="segmented-btn" data-type="income">收入</button>
                    <button type="button" class="segmented-btn" data-type="refund">退款/转移</button>
                </div>

                <div class="flex gap-3">
                    <div class="w-[45%]">
                        <label class="block text-xs font-medium text-gray-500 mb-1 ml-1">日期</label>
                        <input type="date" id="tx-date" class="w-full rounded-xl h-12 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium text-gray-700 bg-gray-50/80 border border-gray-200/50" required>
                    </div>
                    <div class="w-[55%]">
                        <label class="block text-xs font-medium text-gray-500 mb-1 ml-1">金额</label>
                        <input type="number" id="amount" class="w-full rounded-xl h-12 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500 font-bold text-lg bg-gray-50/80 border border-gray-200/50" placeholder="0.00" step="0.01" inputmode="decimal" required>
                    </div>
                </div>

                <div class="flex gap-3">
                    <div class="w-1/2">
                        <label class="block text-xs font-medium text-gray-500 mb-1 ml-1">账户</label>
                        <select id="account-select" class="w-full rounded-xl h-12 px-3 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium text-gray-700 bg-gray-50/80 border border-gray-200/50"></select>
                    </div>
                    <div class="w-1/2">
                        <label class="block text-xs font-medium text-gray-500 mb-1 ml-1">分类</label>
                        <!-- 这里的选项会根据支出/收入动态变化 -->
                        <select id="category" class="w-full rounded-xl h-12 px-2 focus:outline-none focus:ring-2 focus:ring-blue-500 font-medium text-gray-700 bg-gray-50/80 border border-gray-200/50">
                            <!-- JS 动态注入 -->
                        </select>
                    </div>
                </div>
                
                <div>
                    <label class="block text-xs font-medium text-gray-500 mb-1 ml-1">备注说明</label>
                    <input type="text" id="text" class="w-full rounded-xl h-12 px-4 focus:outline-none focus:ring-2 focus:ring-blue-500 text-gray-700 bg-gray-50/80 border border-gray-200/50" placeholder="例如：打车、发工资..." required>
                </div>

                <button type="submit" class="w-full h-12 bg-gray-900 active:bg-gray-800 text-white font-semibold rounded-xl shadow-lg transition-transform active:scale-95 flex items-center justify-center gap-2 mt-2">
                    <i class="fa-solid fa-check"></i> 保存这笔账单
                </button>
            </form>
        </div>

        <!-- 月份切换与数据区 -->
        <div class="glass-card p-5 mt-2">
            <div class="flex justify-between items-center mb-5 border-b border-gray-100 pb-4">
                <h3 class="font-bold text-gray-800">月度数据看板</h3>
                <input type="month" id="month-filter" class="rounded-lg px-2 py-1 text-sm bg-gray-100 border-none focus:ring-2 focus:ring-blue-500 text-blue-600 font-bold w-32 outline-none">
            </div>

            <!-- 预算进度条 -->
            <div class="mb-6">
                <div class="flex justify-between text-xs mb-1.5 font-medium">
                    <span class="text-gray-500">本月预算消耗</span>
                    <span id="budget-text" class="text-gray-700 font-mono">¥0.00 / 未设置</span>
                </div>
                <div class="w-full bg-gray-100 rounded-full h-2.5 overflow-hidden border border-gray-200">
                    <div id="budget-bar" class="bg-blue-500 h-2.5 rounded-full transition-all duration-500" style="width: 0%"></div>
                </div>
                <p id="budget-warning" class="text-[10px] text-red-500 mt-1 hidden"><i class="fa-solid fa-triangle-exclamation"></i> 警告：本月支出已超预算！</p>
            </div>

            <div class="h-48 relative flex items-center justify-center w-full mb-4">
                <canvas id="expenseChart"></canvas>
            </div>

            <h3 class="font-bold text-sm mb-3 text-gray-600 mt-6 border-t pt-4">该月流水记录</h3>
            <ul id="list" class="space-y-0 divide-y divide-gray-100/50"></ul>
        </div>

        <!-- 原生分享导出按钮 -->
        <div class="glass-card p-5">
            <h3 class="font-bold text-lg mb-4 text-gray-800 flex justify-between items-center">
                <span>导出表格 (CSV)</span>
                <i class="fa-solid fa-share-nodes text-blue-500"></i>
            </h3>
            <div class="flex gap-3">
                <button onclick="exportReport('month')" class="flex-1 bg-white border border-gray-200 py-3 rounded-xl shadow-sm text-sm font-medium text-gray-700 active:bg-gray-50 flex flex-col items-center gap-1 transition-colors">
                    <i class="fa-regular fa-calendar-days text-blue-500 text-lg"></i>本月
                </button>
                <button onclick="exportReport('year')" class="flex-1 bg-white border border-gray-200 py-3 rounded-xl shadow-sm text-sm font-medium text-gray-700 active:bg-gray-50 flex flex-col items-center gap-1 transition-colors">
                    <i class="fa-regular fa-calendar text-indigo-500 text-lg"></i>年度
                </button>
                <button onclick="exportReport('all')" class="flex-1 bg-white border border-gray-200 py-3 rounded-xl shadow-sm text-sm font-medium text-gray-700 active:bg-gray-50 flex flex-col items-center gap-1 transition-colors">
                    <i class="fa-solid fa-database text-green-500 text-lg"></i>全部
                </button>
            </div>
            <p class="text-[10px] text-gray-400 mt-3 text-center">生成表格后，可直接通过微信发送或隔空投送</p>
        </div>
        <p class="text-center text-xs text-gray-400 pb-12">本地极速版 · 数据绝对安全隐秘</p>
    </main>
</div>

<!-- 撤回提示 Toast -->
<div id="undo-toast" class="fixed bottom-10 left-1/2 bg-gray-900 text-white px-5 py-3 rounded-full shadow-2xl flex items-center gap-4 z-50 toast-hidden border border-gray-700">
    <div class="flex items-center gap-2">
        <i class="fa-solid fa-circle-check text-green-400"></i>
        <span id="undo-text" class="text-sm font-medium whitespace-nowrap truncate-text">已记一笔</span>
    </div>
    <div class="w-px h-4 bg-gray-600"></div>
    <button onclick="undoLastTransaction()" class="text-blue-400 font-bold text-sm hover:text-blue-300 active:scale-95 transition-transform whitespace-nowrap">
        <i class="fa-solid fa-rotate-left mr-1"></i>撤回
    </button>
</div>

<!-- 设置模态框 -->
<div id="settings-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-6">
            <h3 class="font-bold text-xl text-gray-800 flex items-center gap-2">
                <i class="fa-solid fa-gear text-blue-500"></i> 系统设置
            </h3>
            <button onclick="closeSettingsModal()" class="text-gray-400 hover:text-gray-600 p-1 bg-gray-100 rounded-full w-8 h-8 flex items-center justify-center transition-colors">
                <i class="fa-solid fa-xmark"></i>
            </button>
        </div>

        <div class="mb-6">
            <label class="block text-sm font-bold text-gray-700 mb-2">💰 每月支出预算上限</label>
            <div class="relative w-full">
                <span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">¥</span>
                <input type="number" id="monthly-budget-input" placeholder="例如: 5000" step="100" class="w-full pl-7 pr-4 py-3 rounded-xl border border-gray-200 focus:outline-none focus:border-blue-500 font-bold bg-gray-50">
            </div>
            <p class="text-[10px] text-gray-400 mt-1">留空则不显示预算进度</p>
        </div>
        
        <h4 class="text-sm font-bold text-gray-700 mb-2 mt-4 border-t pt-4">🏦 设置各账户真实余额</h4>
        <div id="initial-balances-container" class="space-y-1 mb-6 max-h-[30vh] overflow-y-auto pr-2"></div>

        <button onclick="saveSettings()" class="w-full bg-blue-600 text-white py-3 rounded-xl text-sm font-bold active:bg-blue-700 transition-colors shadow-md mb-4">
            保存全部设置
        </button>
        <button onclick="clearAllData()" class="w-full bg-red-50 text-red-600 border border-red-200 py-3 rounded-xl text-sm font-bold active:bg-red-100 transition-colors">
            <i class="fa-solid fa-trash mr-1"></i> 危险区：清空所有数据
        </button>
    </div>
</div>

<!-- 备份恢复模态框 -->
<div id="transfer-modal" class="modal-overlay">
    <div class="modal-content">
        <div class="flex justify-between items-center mb-4">
            <h3 class="font-bold text-lg text-gray-800">跨设备备份与恢复</h3>
            <button onclick="closeTransferModal()" class="text-gray-400 hover:text-gray-600 p-1"><i class="fa-solid fa-xmark text-xl"></i></button>
        </div>
        <p class="text-sm text-gray-600 mb-4">防止数据丢失或更换设备，请定期生成数据码保存。</p>
        <div class="mb-5">
            <button onclick="generateDataCode()" class="w-full bg-blue-50 text-blue-600 border border-blue-200 py-3 rounded-xl text-sm font-bold active:bg-blue-100 transition-colors">
                <i class="fa-solid fa-copy mr-1"></i> 生成并复制当前数据码
            </button>
        </div>
        <hr class="border-gray-100 my-4">
        <div>
            <textarea id="import-code" class="w-full h-24 p-3 rounded-lg border border-gray-200 focus:outline-none focus:border-blue-500 text-xs text-gray-600 resize-none mb-2" placeholder="将复制的数据码粘贴到这里..."></textarea>
            <button onclick="importDataCode()" class="w-full bg-gray-900 text-white py-3 rounded-xl text-sm font-bold active:bg-gray-800 transition-colors">
                <i class="fa-solid fa-download mr-1"></i> 导入并覆盖恢复数据
            </button>
            <p class="text-[10px] text-red-500 mt-2 text-center hidden" id="import-error"></p>
        </div>
    </div>
</div>

<script>
    // --- 核心配置 ---
    const accountTypes = [
        { id: 'alipay', name: '支付宝', icon: 'fa-alipay', colorClass: 'grad-alipay', isPersonal: true },
        { id: 'wechat', name: '微信余额', icon: 'fa-weixin', colorClass: 'grad-wechat', isPersonal: true },
        { id: 'boc', name: '中国银行', icon: 'fa-building-columns', colorClass: 'grad-boc', isPersonal: true },
        { id: 'icbc', name: '工商银行', icon: 'fa-building-columns', colorClass: 'grad-icbc', isPersonal: true },
        { id: 'abc', name: '农业银行', icon: 'fa-leaf', colorClass: 'grad-abc', isPersonal: true },
        { id: 'spdb', name: '浦发银行', icon: 'fa-building-columns', colorClass: 'grad-spdb', isPersonal: true },
        { id: 'partner', name: '我对象', icon: 'fa-heart', colorClass: 'grad-partner', isPersonal: false },
        { id: 'stock', name: '股票账户', icon: 'fa-arrow-trend-up', colorClass: 'grad-stock', isPersonal: true },
        { id: 'fund', name: '基金账户', icon: 'fa-seedling', colorClass: 'grad-fund', isPersonal: true }
    ];

    // 智能动态分类字典
    const categoriesMap = {
        'expense': ['🍔 餐饮', '🛒 超市日用', '🚗 交通出行', '🏠 住房水电', '📚 学习成长', '💊 医疗健康', '👗 衣物美妆', '📱 数码家电', '🎮 社交娱乐', '🎁 礼物人情', '✈️ 旅行', '🐾 宠物', '📝 其他支出'],
        'income': ['💰 工资收入', '📈 投资理财', '🧧 红包奖金', '🛍️ 闲置二手', '📝 其他收入'],
        'refund': ['↩️ 退款冲销', '🔄 往来结算', '✅ 还款结清']
    };

    // --- DOM 元素 ---
    const totalBalanceEl = document.getElementById('total-balance');
    const accountContainer = document.getElementById('account-container');
    const accountSelect = document.getElementById('account-select');
    const categorySelect = document.getElementById('category');
    const list = document.getElementById('list');
    const form = document.getElementById('form');
    const text = document.getElementById('text');
    const amount = document.getElementById('amount');
    const datePicker = document.getElementById('tx-date');
    const monthFilter = document.getElementById('month-filter');
    const budgetBar = document.getElementById('budget-bar');
    const budgetText = document.getElementById('budget-text');
    const budgetWarning = document.getElementById('budget-warning');
    
    let currentType = 'expense';
    let expenseChart = null;
    let lastAddedTxId = null;
    let undoTimeout = null;
    
    // --- 本地存储数据 ---
    const KEY_TX = 'speed_ledger_tx_final';
    const KEY_BAL = 'speed_ledger_bal_final';
    const KEY_BUDGET = 'speed_ledger_budget_final';
    
    let transactions = JSON.parse(localStorage.getItem(KEY_TX)) || [];
    let initialBalances = JSON.parse(localStorage.getItem(KEY_BAL)) || {};
    let monthlyBudget = parseFloat(localStorage.getItem(KEY_BUDGET)) || 0;

    accountTypes.forEach(acc => { if (initialBalances[acc.id] === undefined) initialBalances[acc.id] = 0; });

    // 格式化金额 (千分位)
    function formatMoney(num) {
        return Number(num).toLocaleString('zh-CN', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
    }

    // 动态更新分类下拉框
    function updateCategoryOptions(type) {
        const opts = categoriesMap[type] || categoriesMap['expense'];
        categorySelect.innerHTML = opts.map(c => `<option value="${c}">${c}</option>`).join('');
    }

    // --- 初始化 UI ---
    function initUI() {
        const today = new Date();
        const yyyy = today.getFullYear();
        const mm = String(today.getMonth() + 1).padStart(2, '0');
        const dd = String(today.getDate()).padStart(2, '0');
        
        datePicker.value = `${yyyy}-${mm}-${dd}`;
        monthFilter.value = `${yyyy}-${mm}`;

        monthFilter.addEventListener('change', render);
        accountSelect.innerHTML = accountTypes.map(acc => `<option value="${acc.id}">${acc.name}</option>`).join('');
        
        updateCategoryOptions('expense'); // 默认加载支出分类

        const btns = document.querySelectorAll('.segmented-btn');
        btns.forEach(btn => {
            btn.addEventListener('click', (e) => {
                btns.forEach(b => b.classList.remove('active', 'text-red-500', 'text-green-500', 'text-blue-500'));
                const clickedBtn = e.target;
                clickedBtn.classList.add('active');
                currentType = clickedBtn.dataset.type;
                
                // 颜色和分类联动
                updateCategoryOptions(currentType);
                if(currentType === 'expense') clickedBtn.classList.add('text-red-500');
                else if(currentType === 'income') clickedBtn.classList.add('text-green-500');
                else clickedBtn.classList.add('text-blue-500');
            });
        });
        render();
    }

    function render() {
        localStorage.setItem(KEY_TX, JSON.stringify(transactions));
        localStorage.setItem(KEY_BAL, JSON.stringify(initialBalances));
        localStorage.setItem(KEY_BUDGET, monthlyBudget.toString());

        const selectedMonth = monthFilter.value; 
        const balances = { ...initialBalances };
        let personalTotal = 0, partnerTotal = 0;
        
        accountTypes.forEach(acc => {
            if (acc.isPersonal) personalTotal += (initialBalances[acc.id] || 0);
            else partnerTotal += (initialBalances[acc.id] || 0);
        });

        transactions.forEach(t => {
            if (balances[t.accountId] !== undefined) balances[t.accountId] += t.amount;
            const accInfo = accountTypes.find(a => a.id === t.accountId);
            if (accInfo) {
                if (accInfo.isPersonal) personalTotal += t.amount;
                else partnerTotal += t.amount;
            }
        });

        // 应用千分位格式化
        totalBalanceEl.innerText = `¥${formatMoney(personalTotal)}`;
        const pBal = document.getElementById('partner-balance');
        if (pBal) pBal.innerText = `¥${formatMoney(partnerTotal)}`;
        
        renderAccounts(balances);
        const monthTxs = transactions.filter(t => t.dateObj.startsWith(selectedMonth));
        renderBudget(monthTxs);
        renderTransactions(monthTxs);
        renderChart(monthTxs);
    }

    function renderBudget(monthTxs) {
        if (!monthlyBudget || monthlyBudget <= 0) {
            budgetText.innerText = "未设置预算"; budgetBar.style.width = "0%"; budgetWarning.classList.add('hidden');
            return;
        }
        const totalExpense = monthTxs.filter(t => t.amount < 0 && t.type === 'expense').reduce((acc, t) => acc + Math.abs(t.amount), 0);
        let percentage = (totalExpense / monthlyBudget) * 100;
        if (percentage > 100) percentage = 100;

        budgetText.innerText = `¥${formatMoney(totalExpense)} / ¥${formatMoney(monthlyBudget)}`;
        budgetBar.style.width = `${percentage}%`;

        if (percentage >= 90) { budgetBar.classList.replace('bg-blue-500', 'bg-red-500'); budgetWarning.classList.remove('hidden'); } 
        else if (percentage >= 75) { budgetBar.classList.replace('bg-blue-500', 'bg-yellow-500'); budgetWarning.classList.add('hidden'); } 
        else { budgetBar.classList.remove('bg-red-500', 'bg-yellow-500'); budgetBar.classList.add('bg-blue-500'); budgetWarning.classList.add('hidden'); }
    }

    function renderAccounts(balances) {
        accountContainer.innerHTML = '';
        accountTypes.forEach(acc => {
            const bal = balances[acc.id] || 0;
            const card = document.createElement('div');
            card.className = `account-card ${acc.colorClass} rounded-2xl p-4 text-white shadow-md flex flex-col justify-between h-28`;
            card.innerHTML = `<div class="flex items-center gap-2 opacity-90"><i class="fa-brands ${acc.icon} ${['fa-building-columns', 'fa-leaf', 'fa-heart', 'fa-arrow-trend-up', 'fa-seedling'].includes(acc.icon) ? 'fa-solid' : ''}"></i><span class="text-xs font-medium tracking-wide">${acc.name}</span></div><div><p class="text-xs opacity-70 mb-0.5">余额</p><p class="text-lg font-bold">¥${formatMoney(bal)}</p></div>`;
            accountContainer.appendChild(card);
        });
    }

    function renderTransactions(monthTxs) {
        list.innerHTML = '';
        if(monthTxs.length === 0) {
            list.innerHTML = `<li class="text-gray-400 text-center py-10 text-sm"><i class="fa-solid fa-ghost mb-3 text-3xl opacity-30 block"></i>${monthFilter.value} 月还没有账单记录哦</li>`;
            return;
        }

        const sorted = [...monthTxs].sort((a, b) => {
            const dateA = new Date(a.dateObj).getTime();
            const dateB = new Date(b.dateObj).getTime();
            if (dateA !== dateB) return dateB - dateA;
            return b.timestamp - a.timestamp;
        });

        sorted.forEach(t => {
            const isExpense = t.amount < 0;
            const colorClass = isExpense ? 'text-gray-900' : 'text-green-600';
            const sign = isExpense ? '' : '+';
            const accName = accountTypes.find(a => a.id === t.accountId)?.name || '未知';

            let iconStr = 'fa-tag';
            if (t.category.includes('餐饮')) iconStr = 'fa-utensils';
            if (t.category.includes('超市')) iconStr = 'fa-basket-shopping';
            if (t.category.includes('交通')) iconStr = 'fa-car';
            if (t.category.includes('住房')) iconStr = 'fa-house';
            if (t.category.includes('医疗')) iconStr = 'fa-notes-medical';
            if (t.category.includes('社交') || t.category.includes('娱乐')) iconStr = 'fa-gamepad';
            if (t.category.includes('旅行')) iconStr = 'fa-plane';
            if (t.category.includes('工资')) iconStr = 'fa-coins';
            if (t.category.includes('投资')) iconStr = 'fa-chart-line';
            if (t.category.includes('退款') || t.category.includes('转移')) iconStr = 'fa-arrow-rotate-left';

            const item = document.createElement('li');
            item.className = 'py-4 flex items-center justify-between group border-b border-gray-50/50 last:border-0';
            item.innerHTML = `
                <div class="flex items-center gap-4 w-2/3">
                    <div class="w-10 h-10 bg-gray-100 rounded-full flex flex-shrink-0 items-center justify-center text-gray-500"><i class="fa-solid ${iconStr}"></i></div>
                    <div class="overflow-hidden">
                        <p class="font-semibold text-gray-800 text-sm truncate">${t.text}</p>
                        <p class="text-xs text-gray-400 mt-0.5 truncate">${t.category} · ${accName}</p>
                    </div>
                </div>
                <div class="flex items-center gap-3 w-1/3 justify-end">
                    <div class="text-right">
                        <span class="font-bold block text-sm ${colorClass}">${sign}${formatMoney(t.amount)}</span>
                        <span class="text-[10px] text-gray-400 font-mono">${t.dateObj}</span>
                    </div>
                    <button class="text-gray-200 hover:text-red-500 transition-colors p-2 active:bg-red-50 rounded-full flex-shrink-0" onclick="removeTransaction('${t.id}')"><i class="fa-solid fa-trash-can text-sm"></i></button>
                </div>
            `;
            list.appendChild(item);
        });
    }

    function renderChart(monthTxs) {
        const ctx = document.getElementById('expenseChart').getContext('2d');
        const expenseTxs = monthTxs.filter(t => t.amount < 0 && t.type === 'expense');
        const categoryTotals = {};
        expenseTxs.forEach(t => categoryTotals[t.category] = (categoryTotals[t.category] || 0) + Math.abs(t.amount));

        const labels = Object.keys(categoryTotals);
        const data = Object.values(categoryTotals);
        
        // 更高级的莫兰迪配色体系
        const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899', '#06b6d4', '#64748b', '#84cc16', '#f43f5e'];

        if (expenseChart) expenseChart.destroy();
        if (labels.length === 0) {
            document.getElementById('expenseChart').parentElement.innerHTML = `<p class="text-gray-400 text-sm">该月暂无消费数据</p><canvas id="expenseChart" class="hidden"></canvas>`;
            return;
        } else {
            const container = document.getElementById('expenseChart').parentElement;
            if(container.querySelector('p')) container.innerHTML = '<canvas id="expenseChart"></canvas>';
        }

        expenseChart = new Chart(document.getElementById('expenseChart').getContext('2d'), {
            type: 'doughnut',
            data: { labels, datasets: [{ data, backgroundColor: colors.slice(0, labels.length), borderWidth: 2, borderColor: '#ffffff' }] },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { position: 'right', labels: { usePointStyle: true, boxWidth: 8, font: {size: 11} } } }, cutout: '70%' }
        });
    }

    // --- 撤回系统 ---
    function showUndoToast(tx) {
        const toast = document.getElementById('undo-toast');
        document.getElementById('undo-text').innerText = `已记: ${tx.text} (¥${formatMoney(Math.abs(tx.amount))})`;
        toast.classList.remove('toast-hidden');
        toast.classList.add('toast-visible');
        
        if(undoTimeout) clearTimeout(undoTimeout);
        undoTimeout = setTimeout(() => {
            toast.classList.remove('toast-visible');
            toast.classList.add('toast-hidden');
            lastAddedTxId = null; 
        }, 5000);
    }

    window.undoLastTransaction = function() {
        if(!lastAddedTxId) return;
        transactions = transactions.filter(t => t.id !== lastAddedTxId);
        lastAddedTxId = null; 
        const toast = document.getElementById('undo-toast');
        toast.classList.remove('toast-visible');
        toast.classList.add('toast-hidden');
        if (navigator.vibrate) navigator.vibrate(50);
        render();
    };

    form.addEventListener('submit', (e) => {
        e.preventDefault();
        if (text.value.trim() === '' || amount.value.trim() === '') return;

        let amountVal = Math.abs(+amount.value);
        const finalAmount = currentType === 'expense' ? -amountVal : amountVal;
        const selectedDate = datePicker.value;

        const newTx = {
            id: Date.now().toString() + Math.random().toString(36).substring(2, 9),
            text: text.value,
            amount: finalAmount,
            category: category.value,
            type: currentType,
            accountId: accountSelect.value,
            dateObj: selectedDate,
            timestamp: Date.now()
        };

        transactions.push(newTx);
        lastAddedTxId = newTx.id; 
        
        const txMonth = selectedDate.substring(0, 7);
        monthFilter.value = txMonth;

        text.value = ''; amount.value = '';
        if (navigator.vibrate) navigator.vibrate(50);
        window.scrollTo({top: 0, behavior: 'smooth'});
        render();
        showUndoToast(newTx);
    });

    window.removeTransaction = function(id) {
        if (!confirm("确定要删除这条记录吗？")) return;
        transactions = transactions.filter(t => t.id !== id);
        render();
    };

    window.clearAllData = function() {
        if (!confirm("⚠️ 危险警告！这将会清空你所有的账单、余额和设置信息！\n清空后无法恢复，确定要继续吗？")) return;
        transactions = [];
        initialBalances = {};
        accountTypes.forEach(acc => initialBalances[acc.id] = 0);
        monthlyBudget = 0;
        render();
        closeSettingsModal();
        alert("所有数据已清空。");
    };

    // --- 设置模态框 ---
    const settingsModal = document.getElementById('settings-modal');
    window.openSettingsModal = () => {
        document.getElementById('monthly-budget-input').value = monthlyBudget > 0 ? monthlyBudget : '';
        const initBalContainer = document.getElementById('initial-balances-container');
        initBalContainer.innerHTML = '';
        accountTypes.forEach(acc => {
            const div = document.createElement('div');
            div.className = 'setting-row';
            div.innerHTML = `<div class="flex items-center gap-2"><span class="text-sm font-medium text-gray-700">${acc.name}</span></div><div class="relative w-32"><span class="absolute left-3 top-1/2 -translate-y-1/2 text-gray-400 text-sm">¥</span><input type="number" id="init-bal-${acc.id}" value="${initialBalances[acc.id] || 0}" step="0.01" class="w-full pl-7 pr-2 py-2 rounded-lg border border-gray-200 focus:border-blue-500 text-sm font-mono text-right bg-gray-50"></div>`;
            initBalContainer.appendChild(div);
        });
        settingsModal.style.display = 'flex';
    };
    window.closeSettingsModal = () => settingsModal.style.display = 'none';
    window.saveSettings = () => {
        monthlyBudget = parseFloat(document.getElementById('monthly-budget-input').value) || 0;
        accountTypes.forEach(acc => initialBalances[acc.id] = parseFloat(document.getElementById(`init-bal-${acc.id}`).value) || 0);
        render(); closeSettingsModal();
    };

    // --- 数据传输模态框 ---
    const transferModal = document.getElementById('transfer-modal');
    window.openTransferModal = () => transferModal.style.display = 'flex';
    window.closeTransferModal = () => transferModal.style.display = 'none';
    window.generateDataCode = function() {
        const fullData = { tx: transactions, bal: initialBalances, bud: monthlyBudget };
        const finalCode = "LEDGER_FINAL:" + btoa(unescape(encodeURIComponent(JSON.stringify(fullData))));
        try {
            if (navigator.clipboard && window.isSecureContext) navigator.clipboard.writeText(finalCode).then(() => alert("✅ 数据码已复制！"));
            else throw new Error("Fallback");
        } catch(e) {
            let textArea = document.createElement("textarea");
            textArea.value = finalCode; document.body.appendChild(textArea);
            textArea.select(); document.execCommand('copy'); document.body.removeChild(textArea);
            alert("✅ 数据码已复制！请妥善保存。");
        }
    }
    window.importDataCode = function() {
        const codeInput = document.getElementById('import-code').value.trim();
        if (!codeInput.startsWith("LEDGER_FINAL:") && !codeInput.startsWith("LEDGER_V3:")) return alert("数据码格式错误！");
        try {
            const parsedData = JSON.parse(decodeURIComponent(escape(atob(codeInput.split(":")[1]))));
            if (!confirm("⚠️ 将覆盖所有现有数据，确定导入吗？")) return;
            transactions = parsedData.tx || [];
            initialBalances = parsedData.bal || {};
            monthlyBudget = parsedData.bud || 0;
            render(); closeTransferModal(); alert("🎉 导入成功！您的资产已恢复。");
        } catch (e) { alert("解析失败，请检查复制的内容是否完整。"); }
    }

    // --- 原生分享导出 ---
    window.exportReport = async function(type) {
        if(transactions.length === 0) return alert('暂无数据可导出');
        const now = new Date(), currentYear = now.getFullYear(), currentMonth = now.getMonth();
        let filtered = transactions, filename = '资产报表_全部数据.csv';

        if(type === 'month') {
            filtered = transactions.filter(t => {
                const txDate = new Date(t.dateObj || t.timestamp);
                return txDate.getFullYear() === currentYear && txDate.getMonth() === currentMonth;
            });
            filename = `资产报表_本月_${currentYear}_${String(currentMonth+1).padStart(2,'0')}.csv`;
        } else if(type === 'year') {
            filtered = transactions.filter(t => new Date(t.dateObj || t.timestamp).getFullYear() === currentYear);
            filename = `资产报表_年度_${currentYear}.csv`;
        }

        if(filtered.length === 0) return alert('该时间段内暂无数据');

        const headers = ['记账日期', '收支类型', '分类', '账户', '金额(元)', '备注说明', '系统录入时间'];
        const rows = filtered.map(t => [
            t.dateObj || t.date, 
            t.type === 'expense' ? '支出' : (t.type === 'income' ? '收入' : '退款/转移'),
            t.category,
            accountTypes.find(a => a.id === t.accountId)?.name || '未知',
            Math.abs(t.amount).toFixed(2),
            t.text.replace(/,/g, '，'),
            new Date(t.timestamp).toLocaleString('zh-CN')
        ]);

        let csvContent = "\uFEFF" + headers.join(',') + '\n' + rows.map(r => r.join(',')).join('\n');
        const file = new File([csvContent], filename, { type: 'text/csv;charset=utf-8;' });

        if (navigator.canShare && navigator.canShare({ files: [file] })) {
            try {
                await navigator.share({ files: [file], title: filename, text: '我的理财对账单📊' });
                return; 
            } catch (err) { if (err.name === 'AbortError') return; }
        }
        
        const link = document.createElement("a");
        link.href = URL.createObjectURL(file);
        link.download = filename;
        link.click();
    };

    initUI();
</script>
</body>
</html>
